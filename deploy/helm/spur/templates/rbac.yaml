{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "spur.fullname" . }}-operator
  labels:
    {{- include "spur.componentLabels" (dict "ctx" . "component" "operator") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/status, pods/log]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [spur.amd.com]
    resources: [spurjobs, spurjobs/status, spurjobs/finalizers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "spur.fullname" . }}-operator
  labels:
    {{- include "spur.componentLabels" (dict "ctx" . "component" "operator") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "spur.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "spur.fullname" . }}-operator
  apiGroup: rbac.authorization.k8s.io
{{- end }}
