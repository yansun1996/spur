apiVersion: v1
kind: Service
metadata:
  name: spur-k8s-operator
  namespace: spur
spec:
  selector:
    app: spur-k8s-operator
  ports:
    - name: grpc
      port: 6818
      targetPort: 6818
    - name: health
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spur-k8s-operator
  namespace: spur
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spur-k8s-operator
  template:
    metadata:
      labels:
        app: spur-k8s-operator
    spec:
      containers:
        - name: operator
          image: spur:latest
          command: [spur-k8s-operator]
          args:
            - --controller-addr=spurctld.spur.svc.cluster.local:6817
            - --listen=[::]:6818
            - --health-addr=[::]:8080
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SPUR_OPERATOR_ADDRESS
              value: "spur-k8s-operator.$(POD_NAMESPACE).svc.cluster.local"
          ports:
            - containerPort: 6818
              name: grpc
            - containerPort: 8080
              name: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
