name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build portable binaries (Ubuntu 22.04+ compatible)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: dist
          push: false
          outputs: type=local,dest=./dist
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package binaries
        run: |
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          DIST="spur-${VERSION}-linux-amd64"
          mkdir -p "${DIST}/bin"
          for bin in spur spurctld spurd spurdbd spurrestd; do
            cp "dist/bin/${bin}" "${DIST}/bin/"
          done

          # Create Slurm-compat symlinks
          cd "${DIST}/bin"
          for cmd in sbatch srun squeue scancel sinfo sacct scontrol; do
            ln -s spur "${cmd}"
          done
          cd ../..

          # Include example config
          mkdir -p "${DIST}/etc"
          cp examples/spur.conf "${DIST}/etc/spur.conf.example"

          tar czf "${DIST}.tar.gz" "${DIST}"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
          echo "DIST=${DIST}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spur-linux-amd64
          path: |
            spur-*.tar.gz
            spur-*.tar.gz.sha256

  verify:
    name: Verify on ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: "ubuntu:20.04"
            name: "Ubuntu 20.04"
          - distro: "ubuntu:22.04"
            name: "Ubuntu 22.04"
          - distro: "ubuntu:24.04"
            name: "Ubuntu 24.04"
          - distro: "ubuntu:26.04"
            name: "Ubuntu 26.04 (beta)"
            experimental: true
          - distro: "almalinux:8"
            name: "RHEL 8 (AlmaLinux)"
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: spur-linux-amd64

      - name: Test binaries on ${{ matrix.name }}
        run: |
          tar xzf spur-*.tar.gz
          BINDIR=$(ls -d spur-*/bin | head -1)
          docker run --rm -v "$(pwd)/${BINDIR}:/test:ro" ${{ matrix.distro }} bash -c '
            set -e
            echo "=== $(cat /etc/os-release | grep PRETTY_NAME | cut -d\" -f2) ==="
            echo "glibc: $(ldd --version 2>&1 | head -1)"
            for bin in spur spurctld spurd spurdbd spurrestd; do
              /test/${bin} --help > /dev/null 2>&1
              echo "  ${bin}: OK"
            done
            echo "All binaries verified"
          '

  push-image:
    name: Push image to Docker Hub
    needs: [build, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Determine tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: rocm/spur
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.tag }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-docker
          cache-to: type=gha,scope=release-docker,mode=max

  release:
    name: Create GitHub Release
    needs: [build, verify, push-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: spur-linux-amd64

      - name: Determine tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "${TAG}" \
            --title "Spur ${TAG}" \
            --generate-notes \
            spur-*.tar.gz spur-*.tar.gz.sha256
